name: Build and Release Electron App

on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.1). Leave empty to use package.json version.'
        required: false
        type: string
      release_notes:
        description: 'Release notes (Markdown supported)'
        required: false
        type: string

permissions:
  contents: write # Required to upload artifacts and publish releases

jobs:
  check-version:
    name: Check version change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect version change
        id: check
        shell: bash
        run: |
          # If triggered manually, always proceed
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Compare version with previous commit
          PREV_VERSION=$(git show HEAD^:package.json | jq -r .version)
          CURR_VERSION=$(cat package.json | jq -r .version)
          
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "Version changed from $PREV_VERSION to $CURR_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged ($CURR_VERSION)"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  release:
    name: Build on ${{ matrix.os }}
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update package.json version
        if: github.event.inputs.version != ''
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Generate Release Notes file
        if: github.event.inputs.release_notes != ''
        shell: bash
        run: |
          mkdir -p build
          echo "${{ github.event.inputs.release_notes }}" > build/release-notes.md

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App for Electron
        env:
          ELECTRON: "true"
        run: npm run build

      - name: Package and Publish Electron Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish always

  publish-aur:
    name: Publish AUR package
    needs: [check-version, release]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check AUR secrets
        id: aur-secrets
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_REPO_SSH_URL: ${{ secrets.AUR_REPO_SSH_URL }}
        run: |
          if [[ -z "${AUR_SSH_PRIVATE_KEY}" || -z "${AUR_REPO_SSH_URL}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "AUR secrets are not configured; skipping AUR publish."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare AUR metadata
        if: steps.aur-secrets.outputs.configured == 'true'
        run: ./packaging/aur/folia-major-bin/update.sh

      - name: Set up SSH key
        if: steps.aur-secrets.outputs.configured == 'true'
        shell: bash
        run: |
          install -dm700 ~/.ssh
          printf '%s\n' "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF

      - name: Push package to AUR
        if: steps.aur-secrets.outputs.configured == 'true'
        shell: bash
        env:
          AUR_REPO_SSH_URL: ${{ secrets.AUR_REPO_SSH_URL }}
        run: |
          git clone "${AUR_REPO_SSH_URL}" aur-repo
          cp packaging/aur/folia-major-bin/PKGBUILD aur-repo/PKGBUILD
          cp packaging/aur/folia-major-bin/.SRCINFO aur-repo/.SRCINFO
          cp packaging/aur/folia-major-bin/folia-major.desktop aur-repo/folia-major.desktop
          cp packaging/aur/folia-major-bin/folia-major.png aur-repo/folia-major.png
          cd aur-repo
          if git diff --quiet -- PKGBUILD .SRCINFO folia-major.desktop folia-major.png; then
            echo "No AUR changes to publish"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO folia-major.desktop folia-major.png
          git commit -m "Update to v$(jq -r .version ../package.json)"
          git push
